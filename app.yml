---
- hosts: web
  gather_facts: false
  become: true
  tasks:
    - name: shell git clone
      ansible.builtin.shell:
        cmd: "git clone https://github.com/navneet-rathi/git-sample.git"
      args:
        chdir: /tmp

    - name: Change permission of start.sh
      ansible.builtin.file:
        path: "{{ exercise_dir }}/{{item}}.sh"
        mode: '0755'
        owner: root
        group: root
      loop:
        - start
        - stop

    - name: Start the application
      ansible.builtin.shell: ./start.sh
      args:
        chdir: "{{ exercise_dir }}"
      register: start_output
         
    - name: Display the output of start.sh
      ansible.builtin.debug:
        msg: "{{ start_output.stdout }}"

    - name: Stop the application
      ansible.builtin.shell: ./stop.sh
      args:
        chdir: "{{ exercise_dir }}"
      register: stop_output

    - name: Display the output of stop.sh
      ansible.builtin.debug:
        msg: "{{ stop_output.stdout }}"
          
    - name: Remove the application directory
      ansible.builtin.shell:
        cmd: "rm -rf {{ exercise_dir }}"